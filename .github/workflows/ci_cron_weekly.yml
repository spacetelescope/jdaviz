# GitHub Actions workflow that runs on a cron schedule.
name: Cron Scheduled CI Tests

on:
  workflow_dispatch:
  schedule:
    # run at 9am UTC on Mondays
    - cron: '0 9 * * 1'
  pull_request:
    # We also want this workflow triggered if the 'Extra CI' label is added
    # or present when PR is updated
    types:
      - synchronize
      - labeled

permissions:
  contents: read

jobs:
  # The linkcheck job tests that the links in the docs point to real places
  # The if statement is to prevent cron from running on forks.
  linkcheck:
    runs-on: ubuntu-latest
    if: (github.repository == 'spacetelescope/jdaviz' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'Extra CI')))
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Set up pixi and install the docs environment
      uses: actions/setup-python@cfd55ca82492758d853442341ad4d8010466803a  # v5.6.0
      with:
        environments: docs
        cache: true
    - name: Check links in docs using pixi
      run: pixi run -e docs linkcheck

  ci_cron_tests_dev_roman:
    name: Python 3.14 with latest dev versions of key dependencies and Roman
    runs-on: ubuntu-latest
    if: (github.repository == 'spacetelescope/jdaviz' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'Extra CI')))
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
    - name: Test against dev dependencies with Roman using uv
      env:
        PYTHON_VERSION: '3.14'
        EXTRAS: roman
      run: .github/scripts/run-devdeps.sh

  ci_cron_tests_stable_strauss:
    name: Python 3.13 with stable versions of dependencies and Strauss
    runs-on: ubuntu-latest
    if: (github.repository == 'spacetelescope/jdaviz' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'Extra CI')))
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Set up pixi and install the strauss environment
      # libportaudio (the strauss system dependency) is provided from
      # conda-forge by the strauss environment, so no apt install is needed.
      uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
      with:
        environments: strauss
        cache: true
    - name: Test with pixi
      run: pixi run -e strauss test
