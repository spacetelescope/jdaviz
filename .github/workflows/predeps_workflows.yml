name: rc-testing

on:
  workflow_dispatch:
  schedule:
    # run at 9am UTC on Tuesdays
    - cron: '0 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Github Actions supports ubuntu, windows, and macos virtual environments:
  # https://help.github.com/en/actions/reference/virtual-environments-for-github-hosted-runners
  #
  # NOTE: The tox `-predeps` factor enabled pip pre-releases (release
  # candidates). Because RC testing is inherently unlocked/unreproducible, it is
  # run with uv directly (`uv run --prerelease allow`) rather than through the
  # pixi lock used by the stable environments.
  ci_tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: RC testing on Linux with remote data
            os: ubuntu-latest
            python: '3.13'
            posargs: --remote-data

          - name: RC testing on OSX
            os: macos-latest
            python: '3.14'

          - name: RC testing on Windows
            os: windows-latest
            python: '3.12'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
    - name: Test/run release candidates with uv
      shell: bash
      # MPLBACKEND=agg and JUPYTER_PLATFORM_DIRS=1 match the old tox
      # `[testenv] setenv` (headless matplotlib + new jupyter_core path layout).
      env:
        MPLBACKEND: agg
        JUPYTER_PLATFORM_DIRS: '1'
      run: >
        uv run --python ${{ matrix.python }} --prerelease allow --extra test
        pytest -n auto --dist loadfile --pyargs jdaviz docs
        --ignore=jdaviz/qt.py --durations=30 --memlog ${{ matrix.posargs }}
