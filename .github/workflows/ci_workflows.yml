name: CI

on:
  push:
    branches:
    - main
    - 'v*'
    tags:
    - 'v*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lightweight checks that do not need the full jdaviz environment are run
  # directly with uv (no conda, no full dependency install).
  code_checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Code style checks
            command: uvx flake8 jdaviz --count

          - name: Security audit
            command: uvx bandit -r jdaviz -c .bandit.yaml

          - name: PEP 517
            command: uv build --sdist && uvx twine check dist/* --strict
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
    - name: Run check
      run: ${{ matrix.command }}

  # Github Actions supports ubuntu, windows, and macos virtual environments:
  # https://help.github.com/en/actions/reference/virtual-environments-for-github-hosted-runners
  #
  # Environments and tasks are defined under [tool.pixi.*] in pyproject.toml.
  # Pixi provides the Python interpreter (conda-forge) and uses uv under the
  # hood to install every PyPI dependency.
  ci_tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure || contains(github.event.pull_request.labels.*.name, 'continue-on-error') }}
    strategy:
      matrix:
        include:
          - name: Python 3.13 with coverage checking and all deps
            os: ubuntu-latest
            environment: test-all
            task: test-cov
            posargs: --run-slow
            allow_failure: false

          - name: Python 3.13 with only remote data, coverage checking, and all deps
            os: ubuntu-latest
            environment: test-all
            task: test-cov
            posargs: --remote-data --run-slow -m remote_data
            allow_failure: true

          - name: OS X - Python 3.13
            os: macos-latest
            environment: test-py313
            task: test
            allow_failure: false

          - name: Windows - Python 3.13
            os: windows-latest
            environment: test-py313
            task: test
            allow_failure: false

          - name: Linux - Python 3.14
            os: ubuntu-latest
            environment: test-py314
            task: test
            allow_failure: false

          - name: Python 3.12 with stable versions of dependencies and Roman
            os: ubuntu-latest
            environment: roman
            task: test
            allow_failure: true

    steps:
    - name: Build posargs from labels
      id: build-posargs
      shell: bash
      env:
        LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
      run: |
        posargs="${{ matrix.posargs }}"

        # Add --skip-remote-failures if 'skip-remote-failures' label is present
        if echo "$LABELS" | grep -q 'skip-remote-failures'; then
          posargs="$posargs --skip-remote-failures"
        fi

        # Export as step output so later steps can reference it.
        echo "posargs=$posargs" >> $GITHUB_OUTPUT

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Set up pixi and install the ${{ matrix.environment }} environment
      uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
      with:
        environments: ${{ matrix.environment }}
        # Use the committed pixi.lock for a reproducible, cached install.
        cache: true
    - name: Get IP address for MAST debugging
      if: "contains(matrix.posargs, '--remote-data')"
      run: curl https://api.ipify.org
    - name: Get components for cache key
      id: date
      if: "contains(matrix.posargs, '--remote-data')"
      shell: bash
      run: |
        echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
        echo "week=$(date +'%V')" >> $GITHUB_OUTPUT
        echo "day=$(date +'%j')" >> $GITHUB_OUTPUT
    - name: Restore MAST cache
      if: "contains(matrix.posargs, '--remote-data')"
      id: cache-restore
      uses: actions/cache/restore@v6
      with:
        path: ./
        key: use-restore-keys-below-to-match-in-priority-order
        restore-keys: |
          mast-cache-${{ steps.date.outputs.year }}-${{ steps.date.outputs.week }}-${{ steps.date.outputs.day }}-
          mast-cache-${{ steps.date.outputs.year }}-${{ steps.date.outputs.week }}-
          mast-cache-${{ steps.date.outputs.year }}-
          mast-cache-

    - name: Test/run with pixi
      # pixi runs tasks from the repository root; any restored *.fits cache
      # files are already in the working directory where the tests expect them.
      run: pixi run -e ${{ matrix.environment }} ${{ matrix.task }} -- ${{ steps.build-posargs.outputs.posargs }}

    - name: Upload coverage to artifacts
      if: "matrix.task == 'test-cov'"
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: coverage_${{ matrix.environment }}.xml
        path: coverage.xml
        if-no-files-found: error


  # Tests against the latest development versions (nightly wheels + git main) of
  # key dependencies. These are inherently unlocked, so they are run with uv
  # directly rather than pixi (see .github/scripts/run-devdeps.sh). This also
  # runs on cron, but we run it at the PR stage to catch breakage early.
  devdeps_tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python 3.13 with latest dev versions of key dependencies
            posargs: --run-slow

          - name: Python 3.13 with only remote data and dev deps
            posargs: --remote-data --run-slow -m remote_data
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
    - name: Run tests against dev dependencies
      env:
        PYTHON_VERSION: '3.13'
      run: .github/scripts/run-devdeps.sh ${{ matrix.posargs }}


  upload-codecov:
    needs: [ ci_tests ]
    permissions:
      contents: none
    runs-on: ubuntu-latest
    name: Upload Coverage
    steps:
    # work around CodeCov upload issue
    # see: https://github.com/codecov/codecov-action/issues/1801
    - uses: actions/checkout@v7
    - name: Download coverage artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        path: coverage
        pattern: coverage_*
        merge-multiple: true
    - name: Upload report to Codecov
      if: ${{ hashFiles('coverage/') != '' }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: coverage
        fail_ci_if_error: true
        verbose: true
