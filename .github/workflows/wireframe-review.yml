name: Wireframe Review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
jobs:
  review:
    # Run on PR events, or on issue comments that start with /wireframe-apply on a PR
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/wireframe-apply'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: kecnry/docs-wireframe-demo/.github/actions/wireframe-review@llm-wireframe-watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          docs-root: docs/
          max-prompt-tokens: '6000'
          source-root: jdaviz/
          fail-on-error: 'true'